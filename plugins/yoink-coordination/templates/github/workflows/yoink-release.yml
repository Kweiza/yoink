# yoink-release workflow — schema v1
#
# Customize `runs-on`, `permissions`, and the trigger filter freely
# (enterprise self-hosted runner, custom labels, extra events, etc.).
# `/yoink-coordination:bootstrap` will NOT overwrite this file on updates.
# The actual release logic lives in `.github/yoink/release.py` and is
# refreshed automatically by bootstrap.
#
# If the plugin ever needs changes to this file (e.g. a new required env
# var), the template's schema version will bump. Bootstrap will then
# print a diff and halt — that is the only time you need to touch this
# file manually.

name: yoink release on merge to default branch

on:
  push:
    branches: ['**']

permissions:
  issues: write
  contents: read

jobs:
  release:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run yoink release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          REPO: ${{ github.repository }}
          PRIMARY: ${{ github.event.repository.default_branch }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: python3 .github/yoink/release.py
