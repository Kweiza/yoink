name: yoink release on merge to default branch

on:
  push:
    branches: ['**']

permissions:
  issues: write
  contents: read

jobs:
  release:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run yoink release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          REPO: ${{ github.repository }}
          PRIMARY: ${{ github.event.repository.default_branch }}
        run: python3 .github/yoink/release.py
